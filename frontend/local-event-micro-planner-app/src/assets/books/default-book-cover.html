<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ग्रंथमित्र - Default Book Cover</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            background: linear-gradient(135deg, #8B4513 0%, #654321 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', 'Nirmala UI', sans-serif;
        }
        .book-placeholder {
            text-align: center;
            color: white;
            padding: 2rem;
        }
        .book-icon {
            font-size: 6rem;
            margin-bottom: 1.5rem;
            opacity: 0.9;
            display: block;
        }
        .book-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
        }
        .book-subtitle {
            font-size: 0.9rem;
            opacity: 0.8;
            letter-spacing: 1px;
        }
        .divider {
            width: 100px;
            height: 1px;
            background: #FFD700;
            margin: 1.5rem auto;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="book-placeholder">
        <span class="book-icon">📖</span>
        <div class="book-title">ग्रंथमित्र</div>
        <div class="divider"></div>
        <div class="book-subtitle">MARATHI BOOKS</div>
    </div>
</body>
</html>
